<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Codepong 26 🏓✨</title>
    <link rel="stylesheet" href="./css/style.css">

  </head>
    
  <body>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<div class="app" id="app">
	<header class="hud">
		<div class="brand">
			<img class="brandLogo" id="brandLogo" src="./assets/images/codepong26.png" alt="CODEPONG 26" />
		</div>

		<div class="hudRight">
			<button class="chip" id="btnSound" aria-pressed="false" aria-label="SOUND">
				<i class="fa-solid fa-volume-xmark"></i>
			</button>
			<button class="chip" id="btnFX" aria-pressed="true" aria-label="FX">
				<i class="fa-solid fa-wand-magic-sparkles"></i>
			</button>
			<button class="chip" id="btnPause" aria-pressed="false" aria-label="PAUSE">
				<i class="fa-solid fa-pause"></i>
			</button>
		</div>
	</header>

	<main class="frame" id="frame">
		<canvas id="c"></canvas>

		<div class="crt">
			<div class="scanlines"></div>
			<div class="vignette"></div>
			<div class="rgb"></div>
		</div>

		<div class="overlay intro" id="overlay" aria-live="polite">
			<div class="panel">
				<img class="overlayImg" id="overlayImg" src="./assets/images/codepong26.png" alt="">
				<h1 class="panelTitle" id="panelTitle"></h1>
				<p class="panelBody" id="panelBody"></p>

				<div class="panelRow" id="panelRow">
					<button class="btn" id="btnPlay" aria-label="START">
						<i class="fa-solid fa-play" id="playIcon"></i>
						<span id="playText">START</span>
					</button>
					<button class="btn ghost" id="btnHow">HELP</button>
				</div>

				<div class="tiny" id="tiny">FUN FACT: AI RAMPS UP OVER TIME</div>
			</div>
		</div>

		<div class="score">
			<div class="s" id="sL">0</div>
			<div class="sep"></div>
			<div class="s" id="sR">0</div>
		</div>

		<div class="cutscene" id="cutscene" aria-hidden="true">
			<div class="cutText" id="cutText">MATCH POINT</div>
			<div class="cutSub" id="cutSub">SLOW MO</div>
		</div>

		<footer class="hint">
			<span class="pill">SPACE: START/PAUSE</span>
			<span class="pill">R: RESTART</span>
			<span class="pill">M: MUTE</span>
		</footer>
	</main>
</div>
    <script src="./js/script.js"></script>
    <script>
    // Auto-start for streaming: automatically start game when page loads
    // Also auto-restart when game ends (click "PLAY AGAIN")
    (function autoStart() {
        let attempts = 0;
        const maxAttempts = 30;
        let gameStarted = false;
        let autoRestartEnabled = true;
        
        const tryStart = () => {
            attempts++;
            
            // Check if game is ready and not running
            if (typeof state !== 'undefined' && !state.running && typeof start === 'function') {
                console.log('[auto-start] Starting game...');
                start();
                gameStarted = true;
                return true;
            }
            
            // Also try clicking overlay if visible
            const overlay = document.getElementById('overlay');
            if (overlay && !overlay.classList.contains('hidden')) {
                const panel = overlay.querySelector('.panel');
                if (panel) {
                    console.log('[auto-start] Clicking overlay panel...');
                    panel.click();
                }
            }
            
            // Continue trying if not started yet
            if (attempts < maxAttempts) {
                setTimeout(tryStart, 5000);
            } else {
                console.log('[auto-start] Max attempts reached, game may already be running');
                gameStarted = true;
            }
            
            return false;
        };
        
        // Auto-restart when game ends (PLAY AGAIN)
        const autoRestart = () => {
            if (!autoRestartEnabled) return;
            
            const overlay = document.getElementById('overlay');
            const playText = document.getElementById('playText');
            const btnPlay = document.getElementById('btnPlay');
            
            // Check if overlay is visible and shows "PLAY AGAIN"
            if (overlay && !overlay.classList.contains('hidden')) {
                if (playText && playText.textContent === 'PLAY AGAIN') {
                    console.log('[auto-restart] Game ended, clicking PLAY AGAIN...');
                    if (btnPlay) {
                        btnPlay.click();
                    } else if (overlay.querySelector('.panel')) {
                        overlay.querySelector('.panel').click();
                    }
                }
            }
            
            // Check periodically
            setTimeout(autoRestart, 5000);
        };
        
        // Start checking after a short delay to let script.js initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(tryStart, 5000);
                setTimeout(autoRestart, 5000); // Start auto-restart check after 5s
            });
        } else {
            setTimeout(tryStart, 5000);
            setTimeout(autoRestart, 5000);
        }
    })();
    </script>

  </body>
  
</html>
